# ============================================================
# TikTok 开发者后台 IAA 数据抓取配置（模板）
# 首次使用：cp config.example.yaml config.yaml，再填入本机凭证。
# config.yaml 含 Cookie 等敏感信息，已在 .gitignore 中排除，勿提交。
# ============================================================

# 登录态失效时，是否自动打开后台登录页（仅在终端交互运行时生效）
open_login_on_expire: true

# ===== 账号 =====
# 支持一个或多个账号（每个账号 = 一个 TikTok 组织 org_id）。一次运行会依次
# 抓取所有账号，结果合并到同一 CSV / 同一张 BQ 表（用 app_game/app_key/账号 区分）。
# 字段说明：
#   name          账号别名（唯一，用于日志/CSV 账号列/游戏快照文件名）
#   cookie_source browser=从该浏览器已登录态自动读；config=用该账号的 cookie 字段
#   browser       chrome / firefox / edge / safari 等（cookie_source=browser 时）
#   org_id        组织 ID，来自后台链接 organization/<这串数字>
#   cookie        手动 Cookie（cookie_source=config，或 browser 读取失败时的回退）
# 多账号建议：不同账号在不同浏览器分别登录（如账号1用 Chrome、账号2用 Firefox）。
accounts:
  - name: "account1"
    cookie_source: "browser"
    browser: "chrome"
    org_id: ""
    cookie: ""
  # - name: "account2"
  #   cookie_source: "browser"
  #   browser: "firefox"
  #   org_id: ""
  #   cookie: ""

# 抓取日期：
#   留空 ""  = 自动取最近 days_back 天，最新一天为「今天 - date_offset_days」
#   也可显式指定某一天，如 "2026-06-11"（只抓那天，忽略下面两项）
date: ""

date_offset_days: 1
days_back: 2
ad_type: 1

# 以下为所有账号共享的默认值（可在 accounts 里按账号覆盖）。

# 游戏来源：api（推荐，自动获取）| csv（读本地游戏表）
games_source: "api"

# org_id 已在 accounts 里按账号配置，无需顶层 org_id。

approved_only: true
exclude_games: []
# 多账号时脚本自动用 games_auto_<账号名>.csv，无需手动指定
# games_cache_csv: "games_auto.csv"
games_csv: "游戏信息表 - TT.csv"
game_status_filter: ["已过审"]

include_total: true

regions:
  - United States
  - Japan
  - Indonesia
  - Thailand
  - Philippines
  - Vietnam
  - Malaysia
  - Brazil
  - Saudi Arabia
  - Turkey

concurrency: 4
max_retries: 4
retry_backoff_factor: 1.5
account_pause_seconds: 45
failed_retry_rounds: 2
failed_retry_pause_seconds: 30
failed_retry_concurrency: 2

bigquery:
  enabled: false
  credentials_json: "your-service-account.json"
  table_id: "your_project.your_dataset.your_table"
